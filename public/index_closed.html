<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClousX | Under Maintenance</title>

    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon.png">
    <link rel="shortcut icon" href="assets/favicon.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            overflow: hidden !important;
            height: 100% !important;
        }

        body {
            background: #0b0c10;
            background-image: radial-gradient(circle at 25% 50%, rgba(89, 224, 96, 0.06) 0%, transparent 45%), linear-gradient(180deg, #0b0c10 0%, #050608 100%);
            font-family: 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            direction: rtl;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(89, 224, 96, 0.12) 0%, transparent 70%);
            filter: blur(60px);
            animation: glowPulse 4s ease-in-out infinite;
        }

        @keyframes glowPulse {

            0%,
            100% {
                opacity: 0.4;
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                opacity: 0.9;
                transform: translate(-50%, -50%) scale(1.15);
            }
        }

        .content {
            position: relative;
            z-index: 2;
            padding: 20px;
            max-width: 600px;
        }

        .logo {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 25px;
            direction: ltr;
        }

        .logo .dot {
            color: #59e060;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: #fff;
            margin: 0 0 20px 0;
            line-height: 1.3;
        }

        h1 .accent {
            color: #59e060;
        }

        p {
            color: #9ca3af;
            font-size: 1.1rem;
            line-height: 1.8;
            margin: 0;
        }
    </style>
</head>

<body>
    <div class="content">
        <div class="logo">ClousX<span class="dot">.</span></div>
        <h1>الموقع <span class="accent">مغلق</span></h1>
        <p>الموقع مغلق حتى إشعار آخر<br>شكراً لتفهمكم</p>
    </div>
</body>

</html>
